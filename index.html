<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
</head>
<body>
    <h1>Finance Tracker</h1>
    <h3><i>A tracker so you don't go broke</i></h3>

<form id="expense-form">
    <input type="text" id="title" placeholder="Expense name" required> 
    <input type="number" id="amount" placeholder="Amount spent"  step="0.01" required> 
    <input type="text" id="category" placeholder="=category" required>
    <input type="date" id="date" required> 

    <button type="submit">Add</button>
</form>


<h2>Expenses</h2>
<ul id="expense-list"></ul>

<script src="script.js"></script>
</body>


</html>
